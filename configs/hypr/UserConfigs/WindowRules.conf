# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# For window rules and layerrules
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# This file is used to add or overwrite window rules 
# This file will not be modified during dotfiles updates

# --- Custom Window Rules Override ---

# 1. Thunar to Workspace 3
windowrule = match:class ^([Tt]hunar)$, workspace 3

# 2. Browsers to Workspace 2 (using tags to catch all browsers like Firefox, Chrome, Brave, Zen, etc.)
windowrule = match:tag browser*, workspace 2

# 3. Discord to Workspace 7
windowrule = match:class ^([Dd]iscord|[Ww]ebCord|[Vv]esktop)$, workspace 7

# 4. OBS Studio to Workspace 4
windowrule = match:class ^(com.obsproject.Studio)$, workspace 4

# 5. Cava to float and center
windowrule = match:class ^(cava)$, float on, center on
windowrule = match:title ^(cava)$, float on, center on

# 6. MPV to float and center
windowrule = match:class ^(mpv)$, float on, center on
