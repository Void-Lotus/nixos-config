# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# This is where you put your own keybinds. Be Mindful to check as well ~/.config/hypr/configs/Keybinds.conf to avoid conflict
# if you think I should replace the Pre-defined Keybinds in ~/.config/hypr/configs/Keybinds.conf , submit an issue or let me know in DC and present me a valid reason as to why, such as conflicting with global shortcuts, etc etc

# See https://wiki.hyprland.org/Configuring/Keywords/ for more settings and variables
# See also Laptops.conf for laptops keybinds 

# /* ---- ✴️ Variables ✴️ ---- */  #
$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts
$UserConfigs = $HOME/.config/hypr/UserConfigs

#  IMPORTANT: If you want to remap and existing keybind you MUST unbindd it first 

# The bindings are CASE SENSITIVE. We suggest you copy the exisitng binding here
#  Then change `bindd` to `unbind`

# E.g. 
# unbind = $mainMod, Return, Open terminal, exec, $term
# bindd = $mainMod, Return, Open terminal, exec, ghostty 
#
# unbind = $mainMod, E, file manager, exec, $files
# bindd = $mainMod, T, file manager, exec, $files

# If you are ADDING a bindd, make sure you include the description 
# Other the keybind search menu might not show it properly 

# E.g.
# bindd = $mainMod, Z, My z app, exec APPNAME









# For passthrough keyboard into a VM
# bind = $mainMod ALT, P, submap, passthru
#submap = passthru
# to unbind
#bind = $mainMod ALT, P, submap, reset
#submap = reset

# --- ✴️ Custom Overrides & Additions ✴️ ---

# 1. Remap Mod+W to Zen Browser (Default: Wallpaper Selector)
unbind = $mainMod, W
bindd = $mainMod, W, Open Zen Browser, exec, zen-browser

# 2. Remap Mod+SHIFT+W to Google Chrome (Default: Wallpaper Effects)
unbind = $mainMod SHIFT, W
bindd = $mainMod SHIFT, W, Open Google Chrome, exec, google-chrome-stable

# 3. Remap Mod+SHIFT+Return to Thunar (Default: Dropdown terminal)
unbind = $mainMod SHIFT, Return
bindd = $mainMod SHIFT, Return, Open Thunar, exec, thunar

# 4. Remap Wallpaper Selector to Mod+/
bindd = $mainMod, slash, select wallpaper, exec, $UserScripts/WallpaperSelect.sh

# 5. Remap Wallpaper Effects to Mod+SHIFT+/
bindd = $mainMod SHIFT, slash, wallpaper effects, exec, $UserScripts/WallpaperEffects.sh

# 6. Noctalia Shell Integration Overrides
# App Launcher (Default: Rofi)
unbind = $mainMod, D
bindd = $mainMod, D, Open App Launcher, exec, qs -c noctalia-shell ipc call launcher toggle

# Settings Panel (Default: Rofi Search)
unbind = $mainMod, S
bindd = $mainMod, S, Open Settings Panel, exec, qs -c noctalia-shell ipc call settings toggle

# Assistant Panel (Default: Desktop Overview)
unbind = $mainMod, A
bindd = $mainMod, A, Open Assistant Panel, exec, qs -c noctalia-shell ipc call plugin:assistant-panel toggle

# Lock Screen (Default: LockScreen.sh)
unbind = CTRL ALT, L
bindd = CTRL ALT, L, Lock Screen, exec, qs -c noctalia-shell ipc call lockScreen lock

# Powermenu (Default: Wlogout)
unbind = CTRL ALT, P
bindd = CTRL ALT, P, Powermenu, exec, qs -c noctalia-shell ipc call sessionMenu toggle
bindd = $mainMod SHIFT, Q, Session Menu, exec, qs -c noctalia-shell ipc call sessionMenu toggle

# Clipboard Manager (Noctalia Clipper)
bindd = $mainMod, V, Open Noctalia Clipboard, exec, qs -c noctalia-shell ipc call plugin:clipper toggle

# Notification Center
bindd = $mainMod ALT, N, Open Control Center, exec, qs -c noctalia-shell ipc call controlCenter toggle

# Toggle Trackpad
bindd = $mainMod ALT, space, Toggle Trackpad, exec, $UserScripts/ToggleTrackpad.sh

# 7. Joplin Terminal Application
bindd = $mainMod SHIFT, J, Launch Joplin, exec, kitty -e joplin

# 8. agy command-line utility
bindd = $mainMod, C, Open agy, exec, kitty -e agy

# 9. hyprswitch (Alt-Tab visual switcher)
unbind = ALT, tab
bind = ALT, tab, exec, hyprswitch gui --mod-key alt --key tab --close mod-key-release --reverse-key=mod=shift --sort-recent
bind = ALT SHIFT, tab, exec, hyprswitch gui --mod-key alt --key tab --close mod-key-release --reverse-key=mod=shift --sort-recent

